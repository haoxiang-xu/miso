[toolkit]
id = "terminal"
name = "Terminal Toolkit"
description = "Run restricted shell commands and manage persistent shell sessions."
factory = "miso.builtin_toolkits.terminal_toolkit:terminal_toolkit"
version = "1.0.0"
readme = "README.md"
icon = "icon.svg"
tags = ["builtin", "terminal", "shell"]

[display]
category = "builtin"
order = 20
hidden = false

[compat]
python = ">=3.9"
miso = ">=0"

[[tools]]
name = "terminal_exec"
title = "Execute Command"
description = "Run one shell command inside the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "terminal_session_open"
title = "Open Session"
description = "Open a persistent shell session."
observe = false
requires_confirmation = false

[[tools]]
name = "terminal_session_write"
title = "Write Session"
description = "Write to a persistent shell session and collect available output."
observe = false
requires_confirmation = false

[[tools]]
name = "terminal_session_close"
title = "Close Session"
description = "Close a persistent shell session and return final output."
observe = false
requires_confirmation = false
