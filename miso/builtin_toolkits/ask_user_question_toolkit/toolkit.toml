[toolkit]
id = "ask_user_question"
name = "Ask User Question"
description = "Expose structured user-question tools. Strongly prefer asking the user whenever multiple plausible approaches or decisions could materially change the result. When ask_user_question is available, do not ask the user for structured choices in plain assistant text unless freeform explanation is genuinely required.
"
factory = "miso.builtin_toolkits.ask_user_question_toolkit:ask_user_question_toolkit"
version = "1.0.0"
readme = "README.md"
icon = "question_mark"
color = "#422006"
backgroundcolor = "#f59e0b"
tags = ["builtin", "ask-user", "user-input"]

[display]
category = "builtin"
order = 40
hidden = false

[compat]
python = ">=3.9"
miso = ">=0"

[[tools]]
name = "ask_user_question"
title = "Ask User Question"
description = "Ask the user a structured selector question and suspend the run. Ask for the smallest concrete decision that unblocks the work. Do not ask meta-questions like which aspects to discuss first, and make options concrete candidate answers rather than categories or topics."
observe = false
requires_confirmation = false
