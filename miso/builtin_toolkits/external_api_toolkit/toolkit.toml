[toolkit]
id = "external_api"
name = "External API"
description = "Call external HTTP endpoints with basic GET and POST requests."
factory = "miso.builtin_toolkits.external_api_toolkit:external_api_toolkit"
version = "1.0.0"
readme = "README.md"
icon = "global"
color = "#f0fdfa"
backgroundcolor = "#14b8a6"
tags = ["builtin", "http", "api"]

[display]
category = "builtin"
order = 30
hidden = false

[compat]
python = ">=3.9"
miso = ">=0"

[[tools]]
name = "http_get"
title = "HTTP GET"
description = "Send an HTTP GET request to an external endpoint."
observe = false
requires_confirmation = false

[[tools]]
name = "http_post"
title = "HTTP POST"
description = "Send an HTTP POST request to an external endpoint."
observe = false
requires_confirmation = false
