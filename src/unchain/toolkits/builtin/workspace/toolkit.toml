[toolkit]
id = "workspace"
name = "Workspace Toolkit"
description = "Structured workspace file reading, directory listing, text search, line edits, and session pin management."
factory = "unchain.toolkits.builtin.workspace:WorkspaceToolkit"
version = "1.0.0"
readme = "README.md"
icon = "folder"
color = "#1d4ed8"
backgroundcolor = "#dbeafe"
tags = ["builtin", "workspace", "files", "search"]

[display]
category = "builtin"
order = 10
hidden = false

[compat]
python = ">=3.9"
legacy = ">=0"

[[tools]]
name = "read_files"
title = "Read Files"
description = "Read one or more workspace files as structured results, with optional AST auto-upgrade for large source files."
observe = false
requires_confirmation = false

[[tools]]
name = "list_directories"
title = "List Directories"
description = "List workspace directories as structured entries or recursive trees."
observe = false
requires_confirmation = false

[[tools]]
name = "search_text"
title = "Search Text"
description = "Search text across local workspace files and return structured matches."
observe = false
requires_confirmation = false

[[tools]]
name = "write_file"
title = "Write File"
description = "Create, overwrite, or append to a workspace file."
observe = false
requires_confirmation = true

[[tools]]
name = "read_lines"
title = "Read Lines"
description = "Read a 1-based inclusive line range from a workspace file."
observe = false
requires_confirmation = false

[[tools]]
name = "insert_lines"
title = "Insert Lines"
description = "Insert text before a 1-based line number."
observe = false
requires_confirmation = true

[[tools]]
name = "replace_lines"
title = "Replace Lines"
description = "Replace a 1-based inclusive line range with new text."
observe = false
requires_confirmation = true

[[tools]]
name = "delete_lines"
title = "Delete Lines"
description = "Delete a 1-based inclusive line range from a workspace file."
observe = false
requires_confirmation = true

[[tools]]
name = "pin_file_context"
title = "Pin File Context"
description = "Pin a file or line range into the current session context."
observe = false
requires_confirmation = false

[[tools]]
name = "unpin_file_context"
title = "Unpin File Context"
description = "Remove pinned file context from the current session."
observe = false
requires_confirmation = false
