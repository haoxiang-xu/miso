[toolkit]
id = "external_api"
name = "External API"
description = "Call external HTTP endpoints with basic GET and POST requests."
factory = "unchain.toolkits.builtin.external_api:ExternalAPIToolkit"
version = "1.0.0"
readme = "README.md"
icon = "global"
color = "#f0fdfa"
backgroundcolor = "#14b8a6"
tags = ["builtin", "http", "api"]

[display]
category = "builtin"
order = 30
hidden = false

[compat]
python = ">=3.9"
legacy = ">=0"

[[tools]]
name = "http_get"
title = "HTTP GET"
description = "Send an HTTP GET request to an external endpoint."
observe = false
requires_confirmation = false

[[tools]]
name = "http_post"
title = "HTTP POST"
description = "Send an HTTP POST request to an external endpoint."
observe = false
requires_confirmation = false

[[tools]]
name = "git_status"
title = "Git Status"
description = "Run git status inside the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "git_log"
title = "Git Log"
description = "Run git log with optional arguments inside the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "git_diff"
title = "Git Diff"
description = "Run git diff with optional arguments inside the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "git_add"
title = "Git Add"
description = "Run git add with optional arguments inside the workspace."
observe = false
requires_confirmation = true

[[tools]]
name = "git_commit"
title = "Git Commit"
description = "Run git commit with a message and optional arguments inside the workspace."
observe = false
requires_confirmation = true

[[tools]]
name = "git_checkout"
title = "Git Checkout"
description = "Run git checkout with optional arguments inside the workspace."
observe = false
requires_confirmation = true

[[tools]]
name = "git_branch"
title = "Git Branch"
description = "Run git branch with optional arguments inside the workspace."
observe = false
requires_confirmation = true
