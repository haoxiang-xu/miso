[toolkit]
id = "dev"
name = "Developer Toolkit"
description = "Unified developer toolkit: bash, read, edit, write, glob, grep. Designed for LLM-driven coding agents."
factory = "unchain.toolkits.builtin.dev:DevToolkit"
version = "1.0.0"

[[tools]]
name = "bash"
title = "Bash"
description = "Execute a shell command and return its output."

[[tools]]
name = "read"
title = "Read"
description = "Read a file and return content with line numbers."

[[tools]]
name = "edit"
title = "Edit"
description = "Perform exact string replacement in a file."

[[tools]]
name = "write"
title = "Write"
description = "Create a new file or completely overwrite an existing file."

[[tools]]
name = "glob"
title = "Glob"
description = "Find files matching a glob pattern, sorted by modification time."

[[tools]]
name = "grep"
title = "Grep"
description = "Search file contents with regex, supporting multiple output modes."
