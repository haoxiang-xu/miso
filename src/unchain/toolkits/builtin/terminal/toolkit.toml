[toolkit]
id = "terminal"
name = "Terminal Toolkit"
description = "Run real shell commands and manage persistent shell sessions inside the workspace."
factory = "unchain.toolkits.builtin.terminal:TerminalToolkit"
version = "1.0.0"
readme = "README.md"
icon = "terminal"
color = "#111827"
backgroundcolor = "#d1fae5"
tags = ["builtin", "terminal", "shell", "process"]

[display]
category = "builtin"
order = 20
hidden = false

[compat]
python = ">=3.9"
legacy = ">=0"

[[tools]]
name = "terminal_exec"
title = "Terminal Exec"
description = "Run a real shell command string in the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "terminal_session_open"
title = "Open Terminal Session"
description = "Open a persistent shell session and return a session id."
observe = false
requires_confirmation = false

[[tools]]
name = "terminal_session_write"
title = "Write Terminal Session"
description = "Write input to an open shell session and collect available output."
observe = false
requires_confirmation = false

[[tools]]
name = "terminal_session_close"
title = "Close Terminal Session"
description = "Close a persistent shell session and return final output."
observe = false
requires_confirmation = false
