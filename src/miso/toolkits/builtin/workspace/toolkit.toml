[toolkit]
id = "workspace"
name = "Access Workspace"
description = "Read, create, and edit files and directories inside a workspace root."
factory = "miso.toolkits.builtin.workspace:WorkspaceToolkit"
version = "2.0.0"
readme = "README.md"
icon = "folder"
color = "#eff6ff"
backgroundcolor = "#2563eb"
tags = ["builtin", "workspace", "files", "editing"]

[display]
category = "builtin"
order = 10
hidden = false

[compat]
python = ">=3.9"
miso = ">=0"

[[tools]]
name = "copy_file"
title = "Copy File"
description = "Copy a file to another path inside the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "copy_lines"
title = "Copy Lines"
description = "Copy a line range and insert it at another line in the same file."
observe = false
requires_confirmation = false

[[tools]]
name = "create_directory"
title = "Create Directory"
description = "Create a directory and any missing parents inside the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "create_file"
title = "Create File"
description = "Create a new UTF-8 text file inside the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "delete_file"
title = "Delete File"
description = "Delete a file from the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "delete_lines"
title = "Delete Lines"
description = "Delete a line range from a file."
observe = false
requires_confirmation = false

[[tools]]
name = "file_exists"
title = "Check Path"
description = "Check whether a workspace path exists and whether it is a file or directory."
observe = false
requires_confirmation = false

[[tools]]
name = "insert_lines"
title = "Insert Lines"
description = "Insert text before a specific line number in a file."
observe = false
requires_confirmation = false

[[tools]]
name = "list_directories"
title = "List Directories"
description = "List multiple workspace directories in one call."
observe = false
requires_confirmation = false

[[tools]]
name = "move_file"
title = "Move File"
description = "Move or rename a file inside the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "move_lines"
title = "Move Lines"
description = "Move a line range to another position in the same file."
observe = false
requires_confirmation = false

[[tools]]
name = "pin_file_context"
title = "Pin File Context"
description = "Pin a file or line range into the current session so later turns can reference it."
observe = false
requires_confirmation = false

[[tools]]
name = "read_files"
title = "Read Files"
description = "Read multiple UTF-8 text files from the workspace."
observe = false
requires_confirmation = false

[[tools]]
name = "read_file_ast"
title = "Read File AST"
description = "Parse a supported source file and return a JSON-safe syntax tree."
observe = false
requires_confirmation = false

[[tools]]
name = "read_lines"
title = "Read Lines"
description = "Read a 1-based inclusive line range from a file."
observe = false
requires_confirmation = false

[[tools]]
name = "replace_lines"
title = "Replace Lines"
description = "Replace a line range with new text."
observe = false
requires_confirmation = false

[[tools]]
name = "search_and_replace"
title = "Search And Replace"
description = "Find and replace text within a single file."
observe = false
requires_confirmation = false

[[tools]]
name = "search_text"
title = "Search Text"
description = "Search workspace files with a regex pattern."
observe = true
requires_confirmation = false

[[tools]]
name = "unpin_file_context"
title = "Unpin File Context"
description = "Remove previously pinned file context from the current session."
observe = false
requires_confirmation = false

[[tools]]
name = "write_file"
title = "Write File"
description = "Write or append UTF-8 text inside the workspace."
observe = false
requires_confirmation = false
